services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zen}
      POSTGRES_DB: ${POSTGRES_DB:-zen_admin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # 与下方默认 POSTGRES_* 一致；若改库名/用户请同步修改
      test: ['CMD-SHELL', 'pg_isready -U zen -d zen_admin']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${SERVER_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-zen}:${POSTGRES_PASSWORD:-zen}@db:5432/${POSTGRES_DB:-zen_admin}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SERVER_PORT: '3000'
      PORT: '3000'
    volumes:
      # 与 Nest main.ts 中 process.cwd()/uploads 一致（WORKDIR /app/apps/server）
      - ./uploads:/app/apps/server/uploads

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
